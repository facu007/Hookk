<!DOCTYPE html>
<html class="light" lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Hooke Studio - Identidad antes que algoritmo</title>
  
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23FF2D55'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.75z'/%3E%3C/svg%3E">
</head>
<body class="antialiased selection:bg-soft-blush selection:text-primary min-h-screen flex flex-col relative bg-background text-primary">
  
  <!-- Custom Magnetic Cursor Follower -->
  <div id="hooke-cursor" class="pointer-events-none fixed left-0 top-0 z-[9999] hidden lg:block -translate-x-1/2 -translate-y-1/2">
    <div id="hooke-cursor-glow" class="absolute h-10 w-10 -translate-x-1/2 -translate-y-1/2 rounded-full bg-vibrant-pink/0 blur-md"></div>
    <div id="hooke-cursor-visual" class="absolute h-4.5 w-4.5 -translate-x-1/2 -translate-y-1/2 rounded-full border border-primary bg-transparent"></div>
  </div>

  <!-- TopAppBar Navigation -->
  <header class="fixed z-50 bg-background/80 backdrop-blur-md w-full top-0 border-b border-outline-variant/30 flex justify-between items-center px-margin-mobile md:px-margin-desktop py-unit h-20 transition-all duration-300">
    <a class="font-headline-lg text-2xl md:text-headline-lg tracking-tighter text-primary select-none cursor-pointer router-link font-bold" data-page="home">HOOK</a>
    
    <!-- Desktop Nav Links -->
    <nav class="hidden md:flex items-center gap-8">
      <a class="nav-link router-link text-on-surface-variant hover:text-primary transition-colors duration-300 font-label-caps text-label-caps uppercase text-xs" data-page="portfolio">Portafolio</a>
      <a class="nav-link router-link text-on-surface-variant hover:text-primary transition-colors duration-300 font-label-caps text-label-caps uppercase text-xs" data-page="services">Servicios</a>
      <a class="nav-link router-link text-primary font-bold border-b border-primary pb-1 font-label-caps text-label-caps uppercase text-xs" data-page="home">Manifiesto</a>
      <a class="nav-link router-link text-on-surface-variant hover:text-primary transition-colors duration-300 font-label-caps text-label-caps uppercase text-xs" data-page="contact">Contacto</a>
    </nav>
    
    <div class="flex items-center gap-4">
      <a class="hidden md:inline-block border border-primary px-6 py-2.5 font-label-caps text-label-caps uppercase hover:bg-primary hover:text-pure-white transition-colors duration-300 text-xs router-link" data-page="contact">Consultar</a>
      
      <!-- Mobile menu trigger -->
      <button id="mobile-menu-trigger" class="md:hidden text-primary flex items-center justify-center p-2">
        <span class="material-symbols-outlined text-3xl">menu</span>
      </button>
    </div>
  </header>

  <!-- Mobile Navigation Overlay Drawer -->
  <div id="mobile-menu" class="fixed inset-0 z-[60] bg-background flex flex-col justify-center items-center gap-8 p-8 transform translate-x-full transition-transform duration-500 ease-in-out md:hidden">
    <button id="mobile-menu-close" class="absolute top-6 right-6 text-primary flex items-center justify-center p-2">
      <span class="material-symbols-outlined text-3xl">close</span>
    </button>
    <a class="mobile-nav-link text-2xl font-headline-lg uppercase router-link" data-page="portfolio">Portafolio</a>
    <a class="mobile-nav-link text-2xl font-headline-lg uppercase router-link" data-page="services">Servicios</a>
    <a class="mobile-nav-link text-2xl font-headline-lg uppercase router-link font-bold border-b border-primary" data-page="home">Manifiesto</a>
    <a class="mobile-nav-link text-2xl font-headline-lg uppercase router-link" data-page="contact">Contacto</a>
    <a class="mt-8 border border-primary px-8 py-3 font-label-caps text-label-caps uppercase text-sm router-link" data-page="contact">Consultar ahora</a>
  </div>

  <!-- Dynamic Content Canvas -->
  <main id="app-canvas" class="flex-grow w-full pt-20">
    <!-- Dynamic page templates render here -->
  </main>

  <!-- Footer -->
  <footer class="bg-background border-t border-primary p-margin-mobile md:p-margin-desktop flex flex-col md:flex-row justify-between items-start md:items-center gap-gutter">
    <div class="font-label-caps text-label-caps tracking-widest text-primary text-xs uppercase font-bold text-left">
      © 2024 HOOK Creative Studio. Identidad antes que algoritmo.
    </div>
    <div class="flex flex-wrap gap-6 text-xs font-label-caps uppercase tracking-[0.2em] font-bold">
      <a class="text-on-surface-variant opacity-60 hover:opacity-100 transition-opacity" href="#">Instagram</a>
      <a class="text-on-surface-variant opacity-60 hover:opacity-100 transition-opacity" href="#">LinkedIn</a>
      <a class="text-on-surface-variant opacity-60 hover:opacity-100 transition-opacity" href="#">Behance</a>
      <a class="text-on-surface-variant opacity-60 hover:opacity-100 transition-opacity" href="#">Privacy</a>
    </div>
  </footer>

  <!-- Premium High-End Preloader -->
  <div id="hooke-preloader" class="fixed inset-0 z-[10000] bg-black flex flex-col items-center justify-center text-pure-white select-none transition-all duration-700 ease-out">
    <div class="flex flex-col items-center gap-4 max-w-md px-6 text-center">
      <!-- Minimalist elegant logo text -->
      <h2 id="preloader-brand" class="font-display-xl text-[54px] md:text-[72px] tracking-tighter leading-none text-pure-white uppercase font-bold opacity-0 translate-y-4">
        HOOK
      </h2>
      <p id="preloader-subtitle" class="font-label-caps text-label-caps text-[10px] tracking-[0.3em] text-soft-blush uppercase opacity-0 font-bold translate-y-4">
        Estudio Creativo
      </p>
      
      <!-- Sleek linear progress bar -->
      <div id="preloader-bar-container" class="w-48 bg-pure-white/10 h-0.5 mt-8 relative overflow-hidden opacity-0 translate-y-4">
        <div id="preloader-bar-progress" class="absolute left-0 top-0 h-full w-0 bg-soft-blush"></div>
      </div>
      
      <span id="preloader-percentage" class="font-label-caps text-[9px] tracking-widest text-pure-white/40 opacity-0 translate-y-4">0%</span>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
